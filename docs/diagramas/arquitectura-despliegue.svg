  <text x="155" y="344" text-anchor="middle" font-size="14" fill="#1e1e1e">React + TS + Vite</text>

  <rect x="320" y="290" width="165" height="50" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
