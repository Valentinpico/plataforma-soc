  <rect x="320" y="365" width="165" height="50" rx="8" fill="#d0bfff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="402" y="395" text-anchor="middle" font-size="16" fill="#1e1e1e">Servicio (dominio)</text>
